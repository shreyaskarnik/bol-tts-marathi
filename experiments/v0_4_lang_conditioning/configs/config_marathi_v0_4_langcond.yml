# bol-tts-marathi v0.4 — language-conditioned PLBERT (continuation from v0.2 final).
#
# Init source: epoch_2nd_v0_2_FINAL.pth (validated v0.2 ckpt, 4-voice lineup
# stable). New lang_embedding param is randomly initialized; existing weights
# loaded via strict=False (the missing-key path in load_checkpoint at
# StyleTTS2/models.py:870).
#
# Training axis: language conditioning at PLBERT input embedding layer.
# 0=Marathi, 1=English. Tokens labeled per phoneme via build_v0_4_manifest.py.
#
# Why continuation (`second_stage_load_pretrained: true`) is safe HERE despite
# the v0.2 attempts 1+2 trap (predictor_encoder collapse with continuation +
# joint_epoch:0):
#   1. We keep `joint_epoch: 3` (NOT 0) — adversarial warmup intact, which is
#      the actual fix per feedback_predictor_encoder_lr_collapse.md.
#   2. The new lang_embedding adds learnable freedom that should help the
#      predictor adapt to the conditioning, not collapse from it.
#   3. Belt-and-suspenders: launch_training.sh refuses to run if
#      `second_stage_load_pretrained: true` AND `joint_epoch: 0` simultaneously.
#
# Launch (from kokoro-deutsch/StyleTTS2 on the v0_4_lang_conditioning branch):
#   STAGE=2 CONFIG=../../bol-tts-marathi/experiments/v0_4_lang_conditioning/configs/config_marathi_v0_4_langcond.yml ./launch_training.sh
batch_size: 8
epochs: 10
epochs_1st: 10
epochs_2nd: 10
save_freq: 1

# Init source — v0.2 final ckpt. Path is resolved relative to launch dir
# (StyleTTS2/). Smoke-test override: pass STAGE2_PRETRAINED env var.
pretrained_model: "logs/kokoro-marathi/epoch_2nd_v0_2_FINAL.pth"
first_stage_path: "first_stage.pth"
load_only_params: true
second_stage_load_pretrained: true   # continuation from v0.2 — see header note

# v0.4.2: freeze the loaded backbone for first 1 epoch so only lang_embedding
# trains during warmup (prevents the catastrophic weight shrinkage we hit in
# v0.4.0/4.1 — decoder/predictor/encoders dropped 50-72% in 1 epoch when
# allowed to train alongside a freshly-added lang_embedding parameter).
freeze_backbone_epochs: 1

# Smoke-test mode: when STYLETTS2_SMOKE_TEST=1 in env, train_second.py should
# bail after ~50-100 steps. (Implementation note: this hook is wired in the
# same patch that adds lang_ids; see scripts/train_v0_4_smoke.sh.)

# ── Logging ──────────────────────────────────────────────────────────────────
log_dir: "logs/kokoro-marathi-v0_4"

# ── Data ─────────────────────────────────────────────────────────────────────
# Re-built v0.4 manifests (see scripts/build_v0_4_manifest.py): same audio,
# but text re-phonemized through espeak with romanized loanwords + per-phoneme
# lang_ids. Train/val list paths point to the v0.4 manifest output.
data_params:
  train_data: "../experiments/v0_4_lang_conditioning/data/train_list_v0_4.txt"
  val_data: "../experiments/v0_4_lang_conditioning/data/val_list_v0_4.txt"
  root_path: "../dataset/audio"
  OOD_data: "../training/OOD_texts.txt"
  min_length: 50
  num_workers: 24

# ── Preprocessing ────────────────────────────────────────────────────────────
preprocess_params:
  sr: 24000
  spect_params:
    n_fft: 2048
    win_length: 1200
    hop_length: 300
    n_mels: 80
    fmin: 0
    fmax: 8000

# ── Model Architecture ──────────────────────────────────────────────────────
model_params:
  dim_in: 64
  n_token: 178
  hidden_dim: 512
  style_dim: 128
  max_dur: 50
  multispeaker: false
  n_mels: 80
  dropout: 0.2
  n_layer: 3
  text_encoder_kernel_size: 5

  decoder:
    type: istftnet
    upsample_rates: [10, 6]
    upsample_kernel_sizes: [20, 12]
    upsample_initial_channel: 512
    resblock_kernel_sizes: [3, 7, 11]
    resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
    gen_istft_n_fft: 20
    gen_istft_hop_size: 5

  diffusion:
    embedding_mask_proba: 0.1
    transformer:
      num_layers: 3
      num_heads: 8
      head_features: 64
      multiplier: 2
    dist:
      sigma_data: 0.2
      estimate_sigma_data: true
      mean: -3.0
      std: 1.0

  plbert:
    hidden_size: 768
    num_attention_heads: 12
    intermediate_size: 2048
    max_position_embeddings: 512
    num_hidden_layers: 12
    dropout: 0.1

  slm:
    model: "microsoft/wavlm-base-plus"
    sr: 16000
    hidden: 768
    nlayers: 13
    initial_channel: 64

# ── Loss Weights ─────────────────────────────────────────────────────────────
loss_params:
  lambda_gen: 1.0
  lambda_mel: 5.0
  lambda_dur: 1.0
  lambda_ce: 20.0
  lambda_F0: 1.0
  lambda_norm: 1.0
  lambda_s2s: 1.0
  lambda_mono: 1.0
  lambda_slm: 1.0
  lambda_diff: 0.0
  lambda_sty: 0.0
  TMA_epoch: 0
  diff_epoch: 999
  joint_epoch: 3  # NEVER set to 0 with second_stage_load_pretrained: true

# ── Optimizer ────────────────────────────────────────────────────────────────
# v0.2 LR baseline. Halve only if v0.4 shows divergence in pilot.
optimizer_params:
  lr: 0.0001
  bert_lr: 0.00001    # PLBERT (incl. new lang_embedding) gets bert_lr
  ft_lr: 0.0001

# Dead config block kept only because upstream files still carry it; top-level
# values above are what train_second.py actually reads.
training:
  epochs: 10
  batch_size: 4
  save_freq: 2
  log_interval: 10
  eval_interval: 500
  pretrained_model: ""
  load_only_params: true
  second_stage_load_pretrained: true

# ── Pitch Extractor ──────────────────────────────────────────────────────────
F0_path: "Utils/JDC/bst.t7"

# ── ASR Alignment Model ─────────────────────────────────────────────────────
ASR_config: "Utils/ASR/config.yml"
ASR_path: "Utils/ASR/epoch_00080.pth"

# ── PLBERT ───────────────────────────────────────────────────────────────────
PLBERT_dir: "Utils/PLBERT/"

slmadv_params:
  min_len: 100
  max_len: 500
  batch_percentage: 0.5
  iter: 10
  thresh: 5
  scale: 0.01
  sig: 1.5
